<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alimentos — MenuJPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>

<!-- Topbar (visible solo en móvil) -->
<div class="topbar">
    <div class="topbar-logo">
        <div class="topbar-logo-mark">MJ</div>
        MenuJPA
    </div>
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Abrir menú">
        <i class="bi bi-list"></i>
    </button>
</div>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<nav class="nav-sidebar">
    <a href="/" class="nav-logo">
        <div class="nav-logo-mark">MJ</div>
        <div class="nav-logo-text">MenuJPA <span>Gestión gastronómica</span></div>
    </a>
    <div class="nav-section">
        <span class="nav-section-label">Gestión</span>
        <a href="/menus"     class="nav-link"><i class="bi bi-list-ul"></i><span>Menús</span></a>
        <a href="/recetas"   class="nav-link"><i class="bi bi-card-list"></i><span>Recetas</span></a>
        <a href="/alimentos" class="nav-link active"><i class="bi bi-basket"></i><span>Alimentos</span></a>
    </div>
    <div class="nav-section">
        <span class="nav-section-label">Personal</span>
        <a href="/chefs"    class="nav-link"><i class="bi bi-person-badge"></i><span>Chefs</span></a>
        <a href="/gerentes" class="nav-link"><i class="bi bi-person-workspace"></i><span>Gerentes</span></a>
    </div>
</nav>

<main class="page-content">
    <header class="page-header">
        <div>
            <h1 class="page-title">Alimentos</h1>
            <p class="page-subtitle">Platos fuertes, bebidas, postres y adicionales</p>
        </div>
        <button class="btn btn-primary" onclick="abrirModal()">
            <i class="bi bi-plus"></i> Nuevo Alimento
        </button>
    </header>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="filtrar('todos', this)">Todos</button>
        <button class="filter-btn" onclick="filtrar('PlatoFuerte', this)">Plato Fuerte</button>
        <button class="filter-btn" onclick="filtrar('Bebida', this)">Bebida</button>
        <button class="filter-btn" onclick="filtrar('Postre', this)">Postre</button>
        <button class="filter-btn" onclick="filtrar('Adicional', this)">Adicional</button>
    </div>

    <div class="table-wrapper">
        <div class="table-header">
            <span class="table-title">Catálogo de alimentos</span>
        </div>
        <div class="table-responsive">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Precio</th>
                        <th>Unidad</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="bodyAlimentos">
                    <tr><td colspan="6" style="padding:0"><div class="empty-state"><div class="spinner"></div></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<!-- Modal Alimento -->
<div class="modal-overlay" id="modalAlimentoOverlay">
    <div class="modal modal-md">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitulo">Alimento</h3>
            <button class="modal-close" onclick="modalHide('modalAlimentoOverlay')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
            <input type="hidden" id="alimentoId">
            <div class="form-group">
                <label class="form-label">Nombre <span class="required">*</span></label>
                <input type="text" class="form-input" id="nombre" placeholder="Nombre del alimento" maxlength="100">
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label class="form-label">Tipo <span class="required">*</span></label>
                    <select class="form-input" id="tipoAlimento">
                        <option value="Alimento">General</option>
                        <option value="PlatoFuerte">Plato Fuerte</option>
                        <option value="Bebida">Bebida</option>
                        <option value="Postre">Postre</option>
                        <option value="Adicional">Adicional</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="form-label">Unidad</label>
                    <input type="text" class="form-input" id="unidad" placeholder="porción, 500ml…" maxlength="50">
                </div>
                <div class="form-group">
                    <label class="form-label">Precio ($)</label>
                    <input type="number" class="form-input" id="precio" placeholder="0.00" step="0.01" min="0">
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="modalHide('modalAlimentoOverlay')">Cancelar</button>
            <button class="btn btn-primary" onclick="guardarAlimento()">
                <i class="bi bi-check-lg"></i> Guardar
            </button>
        </div>
    </div>
</div>

<!-- Modal Confirmar Eliminar -->
<div class="modal-overlay" id="modalEliminarOverlay">
    <div class="modal modal-sm">
        <div class="modal-header">
            <h3 class="modal-title">Confirmar eliminación</h3>
            <button class="modal-close" onclick="modalHide('modalEliminarOverlay')"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="modal-body">
            <p class="confirm-text">¿Eliminar este alimento? La acción no se puede deshacer.</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-ghost" onclick="modalHide('modalEliminarOverlay')">Cancelar</button>
            <button class="btn btn-danger" id="btnConfirmarEliminar">
                <i class="bi bi-trash"></i> Eliminar
            </button>
        </div>
    </div>
</div>

<script th:src="@{/js/api.js}"></script>
<script>
const API = '/api/v1/alimentos';
let todosLosAlimentos = [];

async function cargarAlimentos() {
    const data = await cargarConEstado(
        () => apiFetch(API),
        'bodyAlimentos', 6,
        'bi-basket', 'No hay alimentos registrados'
    );
    if (!data) return;
    todosLosAlimentos = data;
    renderTabla(todosLosAlimentos);
}

function getTipo(a) {
    return a['@class'] ? a['@class'].split('.').pop() : (a.tipo || 'Alimento');
}

function renderTabla(lista) {
    const tbody = document.getElementById('bodyAlimentos');
    if (!lista || lista.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="padding:0"><div class="empty-state"><i class="bi bi-basket"></i><p>No hay alimentos registrados</p></div></td></tr>';
        return;
    }
    tbody.innerHTML = lista.map(a => `
        <tr>
            <td><span class="badge badge-default">${a.id}</span></td>
            <td><strong>${a.nombre || '—'}</strong></td>
            <td>${tipoBadge(getTipo(a))}</td>
            <td>${a.precio != null ? '$ ' + Number(a.precio).toLocaleString('es-AR', {minimumFractionDigits: 2}) : '—'}</td>
            <td>${a.unidad || '—'}</td>
            <td>
                <div class="td-actions">
                    <button class="btn btn-ghost btn-sm" onclick="editarAlimento(${a.id})" title="Editar">
                        <i class="bi bi-pencil"></i>
                    </button>
                    <button class="btn btn-danger btn-sm" onclick="confirmarEliminar(${a.id})" title="Eliminar">
                        <i class="bi bi-trash"></i>
                    </button>
                </div>
            </td>
        </tr>
    `).join('');
}

function filtrar(tipo, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderTabla(tipo === 'todos' ? todosLosAlimentos : todosLosAlimentos.filter(a => getTipo(a) === tipo));
}

function abrirModal() {
    ['alimentoId','nombre','unidad','precio'].forEach(id => { document.getElementById(id).value = ''; });
    document.getElementById('tipoAlimento').value = 'Alimento';
    document.getElementById('modalTitulo').textContent = 'Nuevo Alimento';
    modalShow('modalAlimentoOverlay');
}

async function editarAlimento(id) {
    const a = await apiFetch(`${API}/${id}`);
    if (!a) return;
    document.getElementById('alimentoId').value   = a.id;
    document.getElementById('nombre').value       = a.nombre || '';
    document.getElementById('unidad').value       = a.unidad || '';
    document.getElementById('precio').value       = a.precio || '';
    document.getElementById('tipoAlimento').value = getTipo(a);
    document.getElementById('modalTitulo').textContent = 'Editar Alimento';
    modalShow('modalAlimentoOverlay');
}

async function guardarAlimento() {
    const nombre = document.getElementById('nombre').value.trim();
    const precio = document.getElementById('precio').value;

    if (!Validar.requerido(nombre, 'Nombre')) return;
    if (!Validar.maxLength(nombre, 'Nombre', 100)) return;
    if (!Validar.numPositivo(precio, 'Precio')) return;

    const id   = document.getElementById('alimentoId').value;
    const body = {
        nombre,
        tipo:   document.getElementById('tipoAlimento').value,
        unidad: document.getElementById('unidad').value.trim() || null,
        precio: precio ? parseFloat(precio) : null
    };
    if (id) body.id = parseInt(id);

    const result = await apiFetch(id ? `${API}/${id}` : API, id ? 'PUT' : 'POST', body);
    if (result) {
        modalHide('modalAlimentoOverlay');
        mostrarAlerta(id ? 'Alimento actualizado.' : 'Alimento creado.', 'success');
        cargarAlimentos();
    }
}

function confirmarEliminar(id) {
    document.getElementById('btnConfirmarEliminar').onclick = async () => {
        const ok = await apiFetch(`${API}/${id}`, 'DELETE');
        modalHide('modalEliminarOverlay');
        if (ok) {
            mostrarAlerta('Alimento eliminado correctamente.', 'success');
            cargarAlimentos();
        }
    };
    modalShow('modalEliminarOverlay');
}

cargarAlimentos();
</script>
</body>
</html>
